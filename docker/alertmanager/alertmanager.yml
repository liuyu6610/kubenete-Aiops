global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'namespace']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'kubesentinel-backend'
  routes:
    # High-severity alerts go to backend immediately
    - match:
        severity: critical
      group_wait: 10s
      receiver: 'kubesentinel-backend'
    # Also forward to n8n for extra workflow use-cases
    - match:
        channel: 'n8n'
      receiver: 'n8n-webhook-local'

receivers:
  # Primary: Route to KubeSentinel Python backend
  - name: 'kubesentinel-backend'
    webhook_configs:
      - url: 'http://backend:8000/api/v1/webhook/alert'
        send_resolved: true

  # Secondary: n8n for notification workflows
  - name: 'n8n-webhook-local'
    webhook_configs:
      - url: 'http://n8n:5678/webhook/alertmanager'
        send_resolved: true

  - name: 'null'

# Inhibition rules: suppress related alerts when root cause is already firing
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'namespace']
