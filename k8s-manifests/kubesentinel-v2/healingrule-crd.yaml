apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: healingrules.kubesentinel.io
spec:
  group: kubesentinel.io
  names:
    kind: HealingRule
    listKind: HealingRuleList
    plural: healingrules
    singular: healingrule
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Action
          type: string
          jsonPath: .spec.action
          description: "The healing action to perform"
        - name: Target
          type: string
          jsonPath: .spec.targetResource
          description: "Target resource"
        - name: Phase
          type: string
          jsonPath: .status.phase
          description: "Execution status phase"
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                action:
                  type: string
                  description: "Healing action e.g., 'rolling_restart', 'scale_up', 'cordon_node'"
                  enum:
                    - rolling_restart
                    - scale_up
                    - scale_down
                    - rollback
                    - delete_pod
                    - adjust_hpa
                    - cordon_node
                    - evict_pods
                targetResource:
                  type: string
                  description: "Target resource name (e.g., 'order-service' or 'deployment/order-service')"
                targetNamespace:
                  type: string
                  description: "Namespace of the target resource"
                triggerAlert:
                  type: string
                  description: "Name of the alert that caused this healing rule"
                aiConfidence:
                  type: number
                  description: "Confidence score from the LLM"
              required:
                - action
                - targetResource
                - targetNamespace
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: "State of execution: Pending, Executing, Completed, Failed"
                executionTime:
                  type: string
                  format: date-time
                  description: "When the action was taken"
                message:
                  type: string
                  description: "Execution details or error logs"
