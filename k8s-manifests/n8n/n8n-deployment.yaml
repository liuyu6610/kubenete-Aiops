---
# n8n Deployment - 独立的 K8s 清单（更精细的配置）
# 此文件是 setup-cluster.sh 中内嵌部署的完整版本，支持从 Secret 读取凭据
# 应用方式: kubectl apply -f k8s-manifests/n8n/n8n-deployment.yaml
---

# ── n8n Deployment ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: monitoring
  labels:
    app: n8n
    app.kubernetes.io/managed-by: kubesentinel
    app.kubernetes.io/component: workflow-engine
  annotations:
    description: "n8n 低代码工作流引擎 - KubeSentinel 的自动化执行核心"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      serviceAccountName: n8n-healer
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5678
          env:
            # ── 基础配置 ──────────────────────────────────────────
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              valueFrom:
                configMapKeyRef:
                  name: n8n-config
                  key: N8N_PROTOCOL
            - name: N8N_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: n8n-config
                  key: N8N_LOG_LEVEL
            - name: WEBHOOK_URL
              valueFrom:
                configMapKeyRef:
                  name: n8n-config
                  key: N8N_WEBHOOK_BASE_URL

            # ── LLM API Key（从 Secret 读取）─────────────────────
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-credentials
                  key: DASHSCOPE_API_KEY
                  optional: true

            # ── 飞书 Webhook（从 Secret 读取）────────────────────
            - name: FEISHU_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: n8n-credentials
                  key: FEISHU_WEBHOOK_URL
                  optional: true

            # ── n8n 认证配置 ──────────────────────────────────────
            - name: N8N_BASIC_AUTH_ACTIVE
              value: "false"
              # TODO: 生产环境改为 true 并配置 N8N_BASIC_AUTH_USER/PASSWORD

            # ── 执行配置 ──────────────────────────────────────────
            - name: EXECUTIONS_PROCESS
              value: "main"
            - name: EXECUTIONS_DATA_PRUNE
              value: "true"
            - name: EXECUTIONS_DATA_MAX_AGE
              value: "168"   # 保留 7 天执行历史

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n

      volumes:
        - name: n8n-data
          # TODO: 生产环境替换为 PersistentVolumeClaim，防止 Pod 重启丢失工作流数据
          emptyDir: {}

      terminationGracePeriodSeconds: 30

---
# ── n8n Service ────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: monitoring
  labels:
    app: n8n
spec:
  type: NodePort
  selector:
    app: n8n
  ports:
    - name: http
      port: 5678
      targetPort: 5678
      nodePort: 30567

---
# ── ConfigMap：非敏感配置 ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-config
  namespace: monitoring
  labels:
    app: n8n
data:
  N8N_PROTOCOL: "http"
  N8N_LOG_LEVEL: "info"
  # TODO: 替换为实际的 n8n 对外访问地址（NodePort IP 或 Ingress 域名）
  N8N_WEBHOOK_BASE_URL: "http://REPLACE_WITH_YOUR_NODE_IP:30567"
  PROMETHEUS_URL: "http://kube-prometheus-stack-prometheus.monitoring:9090"
  ALERTMANAGER_URL: "http://kube-prometheus-stack-alertmanager.monitoring:9093"
