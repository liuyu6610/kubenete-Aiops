apiVersion: v1
kind: ServiceAccount
metadata:
  name: operator-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubesentinel-operator-role
rules:
# 1. Allow Operator to manage our own HealingRule CRDs
- apiGroups: ["kubesentinel.io"]
  resources: ["healingrules", "healingrules/status", "healingrules/finalizers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# 2. Allow Operator to patch and restart Deployments & StatefulSets
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch", "update", "patch"]

# 3. Allow Operator to Cordon Nodes and restart regular Pods 
- apiGroups: [""]
  resources: ["nodes", "pods"]
  verbs: ["get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesentinel-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubesentinel-operator-role
subjects:
- kind: ServiceAccount
  name: operator-sa
  namespace: default
