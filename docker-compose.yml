version: "3.9"

# ================================================================
# KubeSentinel - 本地开发 Docker Compose
# 用于在无 Kubernetes 环境时本地运行 n8n 和 Prometheus 进行开发调试
#
# 使用方式:
#   docker-compose up -d          启动所有服务
#   docker-compose logs -f n8n    查看 n8n 日志
#   docker-compose down           停止并删除容器
#
# 访问地址:
#   n8n:         http://localhost:5678
#   Prometheus:  http://localhost:9090
#   Grafana:     http://localhost:3000  (admin / admin)
#   Redis:       localhost:6379
# ================================================================

services:

  # ── n8n 工作流引擎（本地开发版）──────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: kubesentinel-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_LOG_LEVEL=info
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_BASIC_AUTH_ACTIVE=false
      - EXECUTIONS_PROCESS=main
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      # LLM API Key（从 .env 文件读取）
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-REPLACE_ME}
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-https://example.com}
      - DINGTALK_WEBHOOK_URL=${DINGTALK_WEBHOOK_URL:-https://example.com}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/workflows:ro  # 挂载工作流文件（只读）
    networks:
      - kubesentinel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prometheus（本地开发版，采集本机 metrics）──────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: kubesentinel-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"         # 允许热重载配置
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - kubesentinel-net

  # ── Grafana（本地可视化）──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: kubesentinel-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./k8s-manifests/monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/kubesentinel.json:ro
    networks:
      - kubesentinel-net
    depends_on:
      - prometheus

  # ── 自研 V2 组件 (本地开发环境) ──────────────────────────────────
  # Python 调度中枢
  backend:
    build:
      context: ./backend-python
    container_name: kubesentinel-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
    networks:
      - kubesentinel-net
    depends_on:
      - prometheus

  # Vue3 可视化前端
  frontend:
    build:
      context: ./frontend-vue
    container_name: kubesentinel-frontend
    restart: unless-stopped
    ports:
      - "8080:80" # Nginx 默认 80
    networks:
      - kubesentinel-net
    depends_on:
      - backend

  # Go Operator 控制器 (通常在集群内运行，本地仅编译测试)
  # operator:
  #   build:
  #     context: ./operator-go
  #   container_name: kubesentinel-operator
  #   networks:
  #     - kubesentinel-net

  # ── Loki（日志聚合）────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: kubesentinel-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - kubesentinel-net

  # ── Alertmanager（本地告警路由）───────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: kubesentinel-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--log.level=info"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - kubesentinel-net

  # ── Redis（本地模拟 demo-app 缓存层）──────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: kubesentinel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - kubesentinel-net

# ── 持久化数据卷 ──────────────────────────────────────────────────
volumes:
  n8n_data:
    name: kubesentinel-n8n-data
  prometheus_data:
    name: kubesentinel-prometheus-data
  grafana_data:
    name: kubesentinel-grafana-data
  alertmanager_data:
    name: kubesentinel-alertmanager-data
  loki_data:
    name: kubesentinel-loki-data

# ── 网络 ──────────────────────────────────────────────────────────
networks:
  kubesentinel-net:
    name: kubesentinel-network
    driver: bridge
