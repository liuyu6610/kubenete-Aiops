global:
  scrape_interval: 15s
  evaluation_interval: 30s

# 指向本地 Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# TODO: 开发阶段根据实际需要添加采集 job
scrape_configs:
  # 采集 Prometheus 自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 采集本地 n8n 指标（如果 n8n 暴露了 metrics 端点）
  # - job_name: 'n8n'
  #   static_configs:
  #     - targets: ['n8n:5678']
  #   metrics_path: '/metrics'
