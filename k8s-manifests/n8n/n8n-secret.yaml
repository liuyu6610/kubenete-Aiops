---
# n8n 凭据 Secret 模板
# 使用前：将所有 REPLACE_ME 替换为真实值
# 应用方式: kubectl apply -f k8s-manifests/n8n/n8n-secret.yaml
#
# ⚠️ 安全提示：请勿将包含真实密钥的 .yaml 文件提交到 Git 仓库
#              建议使用 sealed-secrets 或 external-secrets 管理生产密钥
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-credentials
  namespace: monitoring
  labels:
    app: n8n
    component: credentials
  annotations:
    description: "n8n 运行所需的所有敏感凭据"
type: Opaque
stringData:
  # TODO: 替换为真实的通义千问 API Key
  # 获取地址: https://bailian.console.aliyun.com/
  DASHSCOPE_API_KEY: "REPLACE_ME_WITH_REAL_KEY"

  # TODO: 替换为真实的飞书机器人 Webhook URL
  FEISHU_WEBHOOK_URL: "https://open.feishu.cn/open-apis/bot/v2/hook/REPLACE_ME"

  # TODO: 替换为真实的钉钉机器人 Webhook URL（可选）
  DINGTALK_WEBHOOK_URL: "https://oapi.dingtalk.com/robot/send?access_token=REPLACE_ME"

  # TODO: 如果 n8n 开启了 Basic Auth，填写密码
  N8N_BASIC_AUTH_PASSWORD: "REPLACE_ME_WITH_STRONG_PASSWORD"
